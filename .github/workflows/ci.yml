name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install frontend dependencies
        run: bun install

      - name: Lint (frontend)
        run: bunx oxlint
        working-directory: apps/web

      - name: Type check (frontend)
        run: bun run check:types --filter=web

      - name: Install backend dependencies
        run: uv sync --dev
        working-directory: apps/server

      - name: Lint (backend)
        run: uv run ruff check .
        working-directory: apps/server

      - name: Type check (backend)
        run: uv run ty check
        working-directory: apps/server

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test
        working-directory: apps/web

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [quality]
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_DB: groundup_test
          POSTGRES_USER: groundup
          POSTGRES_PASSWORD: devpassword
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev
        working-directory: apps/server

      - name: Run tests
        run: uv run pytest -v
        working-directory: apps/server
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://groundup:devpassword@localhost:5432/groundup_test
