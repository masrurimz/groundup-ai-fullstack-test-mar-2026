services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: groundup
      POSTGRES_USER: groundup
      POSTGRES_PASSWORD: devpassword
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

volumes:
  timescaledb_data:
